<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Third-Party Verified Seal">
  <defs>
    <style>
      .t { font-family: ui-serif, "Times New Roman", Georgia, serif; letter-spacing: 0.18em; }
      .s { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; letter-spacing: 0.28em; }
    </style>
    <path id="topArc" d="M 90 300 A 210 210 0 0 1 510 300"></path>
    <path id="botArc" d="M 510 300 A 210 210 0 0 1 90 300"></path>
  </defs>

  <!-- Outer rings -->
  <circle cx="300" cy="300" r="265" fill="none" stroke="currentColor" stroke-width="2"></circle>
  <circle cx="300" cy="300" r="242" fill="none" stroke="currentColor" stroke-width="1.5"></circle>

  <!-- Top arc text -->
  <text class="s" font-size="16" fill="currentColor">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">
      THIRD • PARTY • VERIFIED
    </textPath>
  </text>

  <!-- Bottom arc text -->
  <text class="s" font-size="13" fill="currentColor">
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">
      LAB INSPECTED • REPORT NO. • {REPORT_NO}
    </textPath>
  </text>

  <!-- Center mark -->
  <circle cx="300" cy="300" r="152" fill="none" stroke="currentColor" stroke-width="1.5"></circle>
  <circle cx="300" cy="300" r="132" fill="none" stroke="currentColor" stroke-width="1"></circle>

  <!-- Minimal “monogram” -->
  <text x="300" y="292" text-anchor="middle" class="t" font-size="42" fill="currentColor">E</text>
  <text x="300" y="336" text-anchor="middle" class="s" font-size="11" fill="currentColor">
    CNAS · ILAC-MRA · CMA
  </text>

  <!-- Small stars -->
  <g fill="currentColor">
    <circle cx="120" cy="300" r="3"></circle>
    <circle cx="480" cy="300" r="3"></circle>
    <circle cx="300" cy="120" r="3"></circle>
    <circle cx="300" cy="480" r="3"></circle>
  </g>
</svg>
